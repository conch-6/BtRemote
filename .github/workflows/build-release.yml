name: Build Test APK

# 触发条件：这里改成了推送到 main 分支时自动打包，以及支持手动点击运行
# 你也可以改回 on: push: tags: - 'v*' 
on:
  push:
    branches:
      - main # 你的主分支名，如果是 master 就改一下
  workflow_dispatch: # 这个参数允许你在 GitHub 网页上手动点击按钮触发打包

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 配置 JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. 配置 Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools build-tools;36.0.0 platforms;android-36'

      # 4. 构建 APK
      - name: Build APK
        run: |
          chmod +x ./gradlew
          # 如果你想打 Release 包，就把下面这行的 Debug 改成 Release
          # 但注意 Release 如果没配签名，生成的会是 unsigned.apk，安装时可能被拦截
          ./gradlew assembleDefaultDebug --stacktrace

      # 5. 上传为 Artifact (构建产物)
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bt-remote-test-apk # 产物名称，随便起，好听就行
          # 产物路径。如果是 Release 包，把路径里的 debug 换成 release
          path: app/build/outputs/apk/default/debug/app-default-debug.apk
