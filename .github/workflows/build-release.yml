name: Build Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Signed APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools build-tools;36.0.0 platforms;android-36'

      # 1. 还原签名文件到云端临时目录
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p app/keystore
          echo "$KEYSTORE_BASE64" | base64 -d > app/keystore/release.jks

      # 2. 构建 Release APK，并通过环境变量传入签名密码
      - name: Build Release APK
        env:
          # 这里的变量名必须和 build.gradle.kts 里的 System.getenv("...") 完全一致
          ANDROID_KEY_STORE_FILE: ${{ github.workspace }}/app/keystore/release.jks
          ANDROID_KEY_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDefaultRelease --stacktrace

      # 3. 上传产物
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bt-remote-release-apk
          path: app/build/outputs/apk/default/release/app-default-release.apk
